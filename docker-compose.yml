services:
  origin:
    build: ./origin
    container_name: rivet-origin
    ports:
      - "9000:9000"

  edge-1:
    build: ./edge
    container_name: rivet-edge-1
    environment:
      - NODE_NAME=edge-1
      - ORIGIN_URL=http://origin:9000
    ports:
      - "8001:8000"
    depends_on:
      - origin

  edge-2:
    build: ./edge
    container_name: rivet-edge-2
    environment:
      - NODE_NAME=edge-2
      - ORIGIN_URL=http://origin:9000
    ports:
      - "8002:8000"
    depends_on:
      - origin

  edge-3:
    build: ./edge
    container_name: rivet-edge-3
    environment:
      - NODE_NAME=edge-3
      - ORIGIN_URL=http://origin:9000
    ports:
      - "8003:8000"
    depends_on:
      - origin

  prometheus:
    image: prom/prometheus:latest
    container_name: rivet-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - edge-1
      - edge-2
      - edge-3

  grafana:
    image: grafana/grafana:latest
    container_name: rivet-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
